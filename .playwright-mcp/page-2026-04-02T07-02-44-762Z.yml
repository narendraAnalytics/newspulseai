                        - paragraph [ref=e2096]: Regulation — for autonomous driving and other areas — also can ensure that innovation serves the public good. AI technologies employed by mobility companies can help cities and countries achieve their sustainability goals and make mobility services more affordable. As governments work toward hitting their climate targets, AI systems can help make transit systems more efficient through route optimization and traffic management, thereby reducing fuel consumption and emissions from cars. Shared mobility, like ride-hailing or bike-sharing, can benefit from improved efficiencies from AI models, thus resulting in fewer cars on the road.
                        - paragraph [ref=e2097]: Businesses and governments should take note of the profitability potential of AI-powered, safe mobility, as 43% of consumers said they would pay a premium for autonomous transit, according to an Oliver Wyman Forum survey.
