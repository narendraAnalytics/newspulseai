                      - paragraph [ref=e2553]: Just as autonomous driving could benefit from a more established regulatory environment, the construction and engineering sectors would benefit from clear rules around safety and standards for AI systems. Currently, the maturity of regulation varies widely among different authorities. European regulators provide more prescriptive rules, but US agencies have been less involved. Uncertain regulatory environments have led industry groups to step in, but clear frameworks are still not in place. The current lack of clarity creates barriers for businesses seeking to unlock the full potential of AI, and improved regulation could help alleviate these challenges.
