                    - img "Al solutions help rail, traffic systems, and aviation to be more efficient and safe for travelers." [ref=e629]
                    - generic [ref=e631]:
                      - heading "AI addresses pivotal challenges for the mobility industry" [level=3] [ref=e634]
                      - generic [ref=e636]:
                        - paragraph [ref=e637]: AI helps mobility providers navigate a wide range of stressors. Transportation combines the heavy, physical world of rail tracks, airplanes, and car engines with the IT necessary to manage fleets and infrastructure in highly complex operations — all while in the service of customers who must be kept safe, and who demand personalized treatment. AI solutions provide a powerful tool to help address and balance the mobility industry’s need to create a top-notch, safe travel experience.
                        - paragraph [ref=e638]:
                          - text: This need for tech-powered solutions is driving above-average investments in AI, particularly in the auto industry. The value of the AI market in the global automotive industry was $8 billion in 2024, according to Towards Automotive
                          - generic [ref=e639]: "6"
                          - text: . The automotive sector is currently investing an average of 3.5% of revenues in AI, compared to 2.2% for all industries, according to an Oliver Wyman analysis.
                      - generic [ref=e641]:
                        - paragraph [ref=e643]:
                          - text: That investment can help the mobility industry accommodate swelling consumer demand for travel. Airports Council International World predicts an average annual growth of 5.8% in passenger traffic between 2022 and 2040, with more than 19 billion airline passengers by 2040. The worldwide number of rail passengers
                          - generic [ref=e644]: "7"
                          - text: is expected to increase from 970 million in 2023 to 1.08 billion in 2028, while the number of car-sharing users worldwide
                          - generic [ref=e645]: "8"
                          - text: is expected to grow 26%, from 50 million in 2022 to 63 million in 2027. Nearly 70% of recent generative AI users say they plan to use a travel booking channel because it has generative AI capabilities, according to an Oliver Wyman survey
                          - generic [ref=e646]: "9"
                          - text: .
                        - img "Lottie animation" [ref=e650]:
                          - img [ref=e652]:
                            - generic "Value of the AI market in the global automotive industry in 2024" [ref=e654]
                      - heading "Made for mobility, useful elsewhere" [level=3] [ref=e871]
                      - generic [ref=e873]:
                        - paragraph [ref=e874]: Transportation and mobility have long been the source of advances in society and the economy, from standardizing US time zones to developing “agile” and “scrum” working methods that are now the standard for tech development workflows. More recently, airlines developed yield management techniques under which they sell tickets for different prices based on factors such as how close the sale is to the flight date and how many tickets remain. These systems are now widely used in hotels to sell rooms at differing price points to different customers.
                        - paragraph [ref=e875]: Transportation’s role as a pioneer in technology and standards-setting continues today, and it will be especially strong as AI powers transformative changes in safety, customer interaction, and activities from vehicle design to driving or piloting. Mobility’s unique history of innovation means the sector’s experiences will be applicable to a range of other industries, especially those that deliver safety-critical services.
