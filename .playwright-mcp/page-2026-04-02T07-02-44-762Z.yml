                        - heading "Fuel AI systems with the right data" [level=3] [ref=e1255]
                        - paragraph [ref=e1256]: Effective AI implementation requires access to underlying data to train and operate the AI systems. The mobility industry has had several successes in data utilization — such as predictive aircraft maintenance, insurance premiums informed with driver data, and autonomous driving systems and large language models — thanks to its ability to generate vast, unprecedented amounts of data. But some significant barriers still exist, such as effectively gathering, cleaning, and structuring data to be used by AI systems. Other industries facing their own data access challenges can inform their approaches based on mobility’s experience.
                      - generic [ref=e1258]:
                        - generic [ref=e1259]:
                          - heading "Autos" [level=4] [ref=e1260]
                          - paragraph [ref=e1261]: An increasing number of connected vehicles enables automakers to gather large amounts of data that can be utilized externally, such as by selling driver behavior data to insurance providers that then use the data to offer lower premiums to safer drivers.
                          - paragraph [ref=e1262]:
                            - text: Data collection also has improved autonomous driving. To reduce steering jerks, improper stops, and human takeovers, AI is modeling crucial edge cases — extremely rare driving scenarios in which autonomous cars still need to be able to respond the way a human would. Learning to respond to such rare situations requires the collection and analysis of a massive amount of data. Automakers are investing in supercomputers to analyze the up to 19 terabytes of data collected per day by each autonomous vehicle.
                            - generic [ref=e1263]: "17"
                        - img "Lottie animation" [ref=e1267]:
                          - img [ref=e1269]:
                            - generic "Automakers are investing in supercomputers to analyze the up to 19 terabytes of data collected per day by each autonomous vehicle" [ref=e1295]
                      - generic [ref=e1736]:
                        - heading "Aviation" [level=4] [ref=e1737]
                        - paragraph [ref=e1738]: For decades, aviation has utilized predictive data — such as sensor alerts from the airframe or engines predicting aircraft health issues — to proactively schedule maintenance operations. That data informs engineers and maintenance teams if and where an aircraft has a problem. This can be paired with information about when and where replacement parts are available, allowing maintenance teams to reduce delays, service impacts, human error, and administrative time — all while keeping planes in use for longer.
                        - paragraph [ref=e1739]: Historical maintenance and safety data also is used to train large language models that support maintenance technicians. These AI tools help maintenance crews obtain the information and manuals they need, making them more efficient and potentially helping airlines to expand without increasing headcount.
                        - heading "Making data AI-friendly" [level=4] [ref=e1740]
                        - paragraph [ref=e1741]:
                          - text: Despite major successes in utilizing data, mobility still isn’t taking full advantage of the enormous amounts of data it has available. Airlines, for example, often receive information from suppliers and aircraft manufacturers in the form of PDFs. These PDFs, from several third parties in several formats, can be difficult to input into systems and use effectively, requiring time-consuming manual entry to ensure accuracy. Similar processes can be highly time-consuming for IT teams across all transportation providers. “Ninety percent of our work is data cleaning and data structuring,” Jatish Patel, founder and CEO of Flow Labs, a transportation technology company that works to build integrated transportation systems, told SmartBrief in a recent interview.
                          - generic [ref=e1742]: "18"
                          - text: “In transportation, that’s the problem that’s been plaguing the industry for so long.”
