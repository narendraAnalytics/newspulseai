                      - generic [ref=e2062]:
                        - paragraph [ref=e2063]: The auto industry has in recent years relied on partnerships to blend its expertise with that of tech companies to deliver new generations of voice and navigation technologies. The best and most widespread examples of in-car software are smartphone connection systems, which work with a variety of infotainment systems in many car models.
                        - paragraph [ref=e2064]: For companies in other industries, the decision of whether to develop internal solutions or access outside expertise will depend on available resources, system requirements, data privacy, costs, and potential boosts to safety and consumer benefits.
                        - paragraph [ref=e2065]:
                          - text: Educational institutions also provide access to the latest research into the integration of technology and mobility systems. One example is battery experiments carried out at Stanford University
                          - generic [ref=e2066]: "22"
                          - text: through a collaboration with the Massachusetts Institute of Technology and the Toyota Research Institute. Scientists trained a machine learning model on several hundred million points of battery charging and discharging data. Their algorithm predicted the number of cycles that each battery would last and thus whether it was suitable for electric vehicles — a process that normally takes a lengthy analysis and slows down development.
                        - heading "Increase organizational efficiency" [level=4] [ref=e2067]
                        - paragraph [ref=e2068]: The rise of AI will also transform operations and the types of skills needed by the workforce. In the case of airport operations, required skills will become more specialized as AI use expands. Passenger-facing employees will need to upgrade customer service skills and operations teams will need new technology skills to interface with AI systems. The industry also will need to think about how to attract talent into this AI-transformed workplace. Collaborating with academic institutions will be an important way to facilitate interest in aviation and recruitment to meet future industry demands and ensure that workers have future-proofed skills.
                        - heading "Other industries" [level=4] [ref=e2069]
                        - paragraph [ref=e2070]: Other industries can learn from the mobility sector’s experience with partnerships to drive AI deployment. Similar to mobility, the integration of advanced AI systems into construction and agriculture equipment could increase efficiency, from fleet management and harvest project planning to weather forecasting. However, most companies in these industries are not set up to develop complex AI systems internally.
                        - paragraph [ref=e2071]: Major construction and agriculture equipment players have begun partnering with tech companies for cloud connected services, but direct AI partnerships (particularly with newer companies) are still nascent. As in the mobility industry, these partnerships have significant potential in automation, AI-powered analytics, and advanced digital twins. Companies in this space should start assessing how to forge partnerships with AI leaders, as has been done in the mobility space, to capture the latest technology in their products.
                        - paragraph [ref=e2072]: Expanding the role of partnerships will require companies to undergo a fundamental shift from controlling everything in their system to allowing “black boxes” in which they may not fully understand everything that happens in an algorithm. They will have to learn to trust partners and their systems, and to relinquish control over some of the technology.
                        - paragraph [ref=e2073]: Other industries also will benefit from the use of AI recommendations to increase workplace efficiency. In industrial sectors, AI can streamline the process of assigning service technicians to repairs by analyzing their history and the nature of the required repair. Equipment recommendation engines can optimize resource utilization and increase customer satisfaction by recommending the most suitable equipment for a given job. Additionally, text digitization tools can distill extensive repair manual collections and schematics into clear walkthroughs for technicians and format email quotes and service reports into succinct and intelligible summaries, improving communication channels, expediting decision-making processes, and making technicians more efficient and effective.
                        - heading "Work with regulators" [level=3] [ref=e2074]
                        - paragraph [ref=e2075]: Aviation in particular shows how regulation can ensure safety while fostering innovation. In the US, aviation incidents are investigated by a range of agencies, including the Federal Aviation Administration. After serious near-misses and accidents, the FAA conducts scene investigations, data analysis, interviews with people involved, and regulatory compliance checks. Based on its findings, the agency then makes safety recommendations or takes legal action.
                        - paragraph [ref=e2076]: While regulation is often viewed as cumbersome, a clear regulatory environment supports innovation by giving companies a framework to test, certify, and deploy new technologies. Even for new AI-supported technologies that may not yet have published rules, such as air taxis, the stability of the regulatory environment gives companies the confidence to innovate and build trust, and provides a guide for working with regulators to bring new applications to market.
                        - paragraph [ref=e2077]: One area in need of improved regulation is autonomous driving, where 45% of consumers report anxieties about the related technology, according to a global Oliver Wyman Forum survey. Aviation’s clear framework for implementing new tech solutions may provide a model.
                        - paragraph [ref=e2078]:
                          - text: While some autonomous vehicles may be safer than human drivers, they haven’t yet met the level of safety achieved in the aviation or rail industries. After several high-profile safety incidents, some self-driving cars have been pulled off the road, potentially slowing innovation. “There’s been progress, but there remain some real procedural, data, and regulatory gaps,” explained Tilly Chang, executive director of the San Francisco County Transportation Authority, on how to ensure autonomous vehicles
                          - generic [ref=e2079]: "23"
                          - text: serve the public interest.
