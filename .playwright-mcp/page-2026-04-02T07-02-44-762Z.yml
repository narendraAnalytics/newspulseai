                        - paragraph [ref=e1757]:
                          - text: The main challenge is how to harness AI expertise. Fully 96% of employees say that generative AI can benefit their jobs, according to an Oliver Wyman Forum study.
                          - generic [ref=e1758]: "20"
                          - text: But finding exactly how to capture this benefit is not easy, and 57% of employees report receiving insufficient generative AI training from their employer. By 2027, 60% of employees in the wider economy will need reskilling or upskilling on AI
                          - generic [ref=e1759]: "21"
