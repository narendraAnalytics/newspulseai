                        - paragraph [ref=e2090]: Mobility providers must do more to assuage consumer safety concerns, and stricter regulation can help. Less than 20% of consumers said they would definitely use automated cars, shuttles, or land and air taxis, according to a 17-nation Oliver Wyman Forum survey conducted in June 2024, while 64% said that stricter safety protocols would make them more likely to use autonomous vehicles. Without clear rules for experimentation, companies face risks from costly lawsuits due to data privacy concerns and technology glitches. Yet the regulatory landscape has not been fully developed.
                        - paragraph [ref=e2091]: In San Francisco, for instance, autonomous vehicle companies are regulated by the state, not the city. There is also no way to give an autonomous vehicle a traffic ticket without a human driver. The California legislature is considering bills to address these accountability and transparency gaps, highlighting the importance of an improved regulatory framework to allow autonomous vehicles to progress safely.
                        - paragraph [ref=e2092]: The absence of a harmonized regulatory framework for collaborative automation in the US leads “most companies to prioritize local safety — which they should — even if it is at the cost of optimizing overall mobility, traffic fluidity, and energy efficiency,” said Alexandre Bayen, professor of engineering and computer science at the University of California, Berkeley.
