                      - generic [ref=e2116]:
                        - generic [ref=e2117]:
                          - paragraph [ref=e2118]: Mobility’s mixed experience with regulation — from established aviation protocols to developing autonomous vehicle regulation — foreshadows a need for more comprehensive guardrails across all industries to help make AI solutions more trustworthy and improve public perception. Aviation’s long-standing and highly structured regulatory environment has successfully supported innovation and provides an example for other industries, while regulation around autonomous vehicles underscores the pitfalls of less comprehensive regulation for public perception and technology deployment.
                          - paragraph [ref=e2119]: Clearer guidelines for AI use can help consumers become more willing to purchase AI-fueled goods and services. Nearly 30% of consumers believe that organizations using AI are untrustworthy, according to an Oliver Wyman Forum report.
                          - paragraph [ref=e2120]:
                            - text: Beyond the US, there are further examples of forward-looking AI regulation. The EU’s Artificial Intelligence Act
                            - generic [ref=e2121]: "24"
                            - text: was approved in May 2024, setting guardrails and thus making it easier for companies to test AI use cases. Similarly, China recently enacted regulations to address risks and introduce compliance obligations. This approach allows more transparency and encourages mobility industries to experiment and scale.
                        - img "Lottie animation" [ref=e2125]:
                          - img [ref=e2127]:
