                        - paragraph [ref=e1760]: "While these challenges are significant, the potential is enormous: Generative AI can save 300 billion hours of work globally each year, the equivalent of roughly two hours per"
                      - generic [ref=e1762]:
                        - generic [ref=e1763]:
                          - paragraph [ref=e1764]: person per week, according to an Oliver Wyman Forum analysis. Across developed countries, these technologies could drive a 40% increase in labor productivity by 2035.
                          - paragraph [ref=e1765]: In some cases, an internal solution will be best — such as when a unique system is needed that is not available elsewhere, or when an organization has experience developing software solutions. Indeed, some automakers have tried to construct their own ecosystems based on the data they gather.
                          - paragraph [ref=e1766]: But building internal solutions often creates significant challenges and isn’t always successful. Software development requires a particular organizational structure and experienced staff, and many non-tech companies simply do not have in-house expertise.
                          - paragraph [ref=e1767]: The accelerating rate of technological development poses a risk to mobility companies that could fall behind competitors as their
