                        - heading "Find the right partners" [level=4] [ref=e2058]
                        - paragraph [ref=e2059]: Partnering with an AI company is an efficient way to obtain leading-edge AI technology. For example, if an aviation company is developing an AI-based system to recognize aircraft hull damage using cameras, a partnership might ensure that it always has the latest AI visual identification tech. “With the pace at which tools are being developed, companies risk being left in the dust by not having an external source,” says David Shmoys, director of the Center for Data Science for Enterprise and Society at Cornell University.
