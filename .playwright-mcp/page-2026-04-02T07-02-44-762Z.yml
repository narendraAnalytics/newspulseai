                  - generic [ref=e299]:
                    - heading "Introduction" [level=2] [ref=e300]
                    - img "Cars and airplanes both can use AI tech to improve safety and consumer experience" [ref=e301]
                    - generic [ref=e303]:
                      - paragraph [ref=e306]:
                        - text: Flying was a dangerous way to travel — until it became one of the safest. Airlines have adopted a wide range of AI-based technologies that have helped drive huge safety gains, from intelligent weather prediction to advanced risk detection and maintenance systems. The accident rate per 100,000 flight hours declined by nearly 60% from 1994 to 2022
                        - generic [ref=e307]: "2"
                        - text: . The industry’s implementation of leading-edge technologies has greatly improved its safety record. Aviation is not always the fastest mover in adopting new technology, but the industry’s methodical and incremental approach helps foster successful outcomes.
                      - generic [ref=e309]:
                        - generic [ref=e310]:
                          - paragraph [ref=e311]: These innovative systems are an example of how the mobility sector has pioneered the application of technology based on AI. Control, maintenance, and entertainment systems have made mobility modes safer and more enjoyable, from lane assist systems for drivers to improved fuel efficiency and advanced pricing for airlines.
                          - paragraph [ref=e312]:
                            - text: Generative AI has seized the world’s attention since ChatGPT was introduced in late 2022, but many companies are still at a loss when it comes to applying it. Less than half of companies have fully implemented AI solutions
                            - generic [ref=e313]: "3"
                            - text: ", while 95% of leaders at companies that leverage AI capabilities expect the technology to have significant impact on their business over the next three years"
                            - generic [ref=e314]: "4"
                            - text: ", according to Oliver Wyman survey data. And nearly a third of executives see rising AI and tech developments as a top market challenge"
                            - generic [ref=e315]: "5"
                            - text: — the second-highest response after inflation. Mobility’s many use cases of AI provide a roadmap for other industries.
                        - img "Lottie animation" [ref=e319]:
                          - img [ref=e321]:
                            - generic "Decline in the accident rate per 100,000 flight hours from 1994 to 2022" [ref=e323]
                      - generic [ref=e568]:
                        - paragraph [ref=e569]: For this report, AI is considered any technology that enables computers and machines to simulate human intelligence and actions, make decisions like a human operator, and show problem-solving capabilities. An airplane’s autopilot is AI because it makes humanlike decisions, but a train that runs back and forth on a track without responding to outside conditions or events is simply automated. However, if the train can stop after using sensors to spot an object on the track, that would be considered AI.
                        - paragraph [ref=e570]: While traditional AI is trained to perform specific tasks, such as analyzing weather data and choosing a plane’s flight path, generative AI can create new content. It trains on massive datasets to create new material. In mobility, one example of a generative AI solution might be a large language model chatbot to help vehicle maintenance workers resolve problems.
                        - generic [ref=e571]:
                          - paragraph [ref=e573]: The mobility industry has long been at the forefront of adopting innovative AI technologies
                          - img "A timeline history of the transportation industry's use of AI, from autopilot flights in 1947 to self-driving taxis 2018." [ref=e574]
