                      - generic [ref=e947]:
                        - paragraph [ref=e948]: Even as airlines compete for customers, they collaborate to develop technologies and effective procedures to prevent repeated incidents and improve safety. This industry-wide approach provides learning opportunities when adopting new technologies. With the right approach, incremental adoption of new technologies does not disrupt safety or pose a threat to public trust. In other parts of the mobility industry, too, thorough testing and experimentation have ensured that consumers are not put at risk.
                        - paragraph [ref=e949]: This sometimes leads to a cautious approach that slows down technology deployment, as when accidents involving autonomous cars lead to a pause in their use. While this can hinder rollout of new technologies, it ensures technologies are deployed safely and with the interests of consumers in mind. Further, through extensive testing and collaboration with other industry players and regulators, these pauses and other barriers to deployment can be reduced, avoiding unnecessary restrictions while still protecting consumers.
