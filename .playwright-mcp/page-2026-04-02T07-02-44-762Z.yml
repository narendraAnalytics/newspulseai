                        - paragraph [ref=e938]: "Customer needs serve as the North Star for mobility providers in deploying AI solutions. Many AI applications in aviation systems, for example, are focused on limiting negative impacts on travelers, such as delays and cancelations. Predictive technologies give automatic alerts when an engine needs servicing, and airlines can then route the plane to an airport where the repair can be performed without resulting in delays or cancelations. To further increase maintenance efficiency, airlines have implemented large language models to give mechanics access to the information they need to make repairs as quickly as possible. These models can maintain traceability back to source documentation for maintenance instructions, helping ensure that information is accurate. While these applications may not be overtly consumer-facing, they are ultimately geared toward improving the travel experience and have accordingly been prioritized. The automotive industry has a similar focus on consumers: Infotainment systems that improve the driver experience and assisted driving safety features that support human operators are being developed with AI."
                        - heading "Measure impact" [level=3] [ref=e939]
                        - paragraph [ref=e940]: To justify funding for AI and to develop consumer trust, companies need to be able to identify the benefits of the technology for customers and investors. These benefits come in the form of efficiency, sustainability, safety, and customer service metrics.
                        - paragraph [ref=e941]: The mobility industry, like others, still struggles with measuring impact. For autonomous driving, the importance of measuring impact is related to public trust, and companies need to showcase and communicate the safety advantages of AI in driving that may run contrary to widely held perceptions and fears. “Showing the added value of AI is critical for clients to adopt new solutions. Having the right metrics can just help do that,” says Yann Cabaret, CEO of SITA for Aircraft, an air transport communications and IT firm.
