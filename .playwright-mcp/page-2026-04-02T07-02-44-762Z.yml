                        - paragraph [ref=e1746]: All industries face the challenge of converting data into a form that AI systems can digest, so organizations should implement centralized digital processes. AI can help clean and structure inputs so that they flow into a central system and are stored in digital form. The data is then available to train AI systems to carry out and assist in company operations. The challenge of unclean data highlights the need for companies to develop true digital capabilities to capture the power of their data.
                        - paragraph [ref=e1747]:
                          - text: Data accessibility challenges for rail providers highlight a barrier for all industries. Train performance data is essential to driving greater efficiencies and unleashing the potential of AI in rail, but low technology integration along the value chain makes it hard for train operators and shippers to share data. There is also a lack of data transparency in the rail sector. Many datasets are held by different players, and they are incorrectly considered commercially sensitive, thus restricting access
                          - generic [ref=e1748]: "19"
                          - text: for other partners. Removing these kinds of barriers will be essential to opening data access and unlocking the full potential of AI adoption.
                        - heading "Other industries" [level=4] [ref=e1749]
                        - paragraph [ref=e1750]: Many other industries will need to break down barriers to take advantage of AI. In the heavy equipment industry, for example, customers usually assemble fleets of machines from a range of equipment manufacturers, but their data is often stuck in silos that have trouble interfacing between different technology systems. Further complications arise when different equipment is used in tandem, such as a tractor manufactured by one company and a planting or chemical application attachment produced by another.
                        - paragraph [ref=e1751]: How can these systems better communicate to enhance fleet management? One potential solution is using several AI models as translators between different systems to aggregate and standardize data, allowing previously disconnected systems to communicate and work together through AI. Mobility’s successes — and failures — in data utilization can help the heavy equipment industry and beyond.
                        - heading "Organize and form partnerships for AI" [level=3] [ref=e1752]
                        - paragraph [ref=e1753]: AI operating models require a different approach from traditional technologies, and companies in both mobility and other industries have not yet made the transition to a new way of working. “There is still a lot of confusion about what AI is at the management level,” says Chin Kian Keong, senior consultant at ST Engineering and former chief engineer at Singapore’s Land Transport Authority.
